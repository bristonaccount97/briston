<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/90 backdrop-blur shadow-sm">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl font-extrabold tracking-tight">KAOLO</span>
          <span class="hidden text-xs text-gray-500 sm:inline">Store</span>
        </div>

        <div class="flex-1 px-6">
          <div class="relative">
            <input type="text" placeholder="Rechercher un produit…" [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)"
                   class="w-full rounded-full border border-gray-300 bg-white px-4 py-2 pl-10 text-sm shadow focus:ring-2 focus:ring-orange-400 focus:border-orange-400" />
            <svg class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m1.6-5.65a7.25 7.25 0 11-14.5 0 7.25 7.25 0 0114.5 0z"/></svg>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <button class="rounded-full p-2 hover:bg-gray-100">
            <span class="sr-only">Panier</span>🛒
          </button>
          <button class="rounded-full p-2 hover:bg-gray-100">
            <span class="sr-only">Compte</span>👤
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="bg-gradient-to-br from-orange-400 to-orange-500">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 items-center gap-8 py-12 lg:grid-cols-2">
        <div class="text-white">
          <h1 class="text-4xl font-extrabold sm:text-5xl">VOTRE COUP<br/>DE COEUR</h1>
          <p class="mt-4 text-white/90">Trouvez le produit qu’il vous faut</p>
          <button class="mt-6 rounded-lg bg-white px-5 py-3 text-sm font-semibold text-orange-600 shadow hover:bg-gray-50">Acheter maintenant</button>
        </div>
        <div class="relative">
          <img class="mx-auto w-3/4 drop-shadow-xl" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=1600&auto=format&fit=crop" alt="Laptop"/>
        </div>
      </div>
    </div>
  </section>

  <!-- Catégories + Dropdown-->
  <section class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-10">
    <h2 class="text-2xl font-bold">Catégories</h2>

    <div class="mt-4 flex items-center gap-4">
      <label class="text-sm text-gray-600">Filtrer par</label>
      <select class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm focus:border-orange-400 focus:ring-2 focus:ring-orange-400"
              [ngModel]="selectedCategoryId()" (ngModelChange)="selectedCategoryId.set($event)">
        <option *ngFor="let c of categories" [value]="c.id">{{ c.label }}</option>
      </select>
    </div>

    <div class="mt-6 grid grid-cols-2 gap-4 sm:grid-cols-4">
      <div class="rounded-xl bg-gray-100 p-6 text-center" *ngFor="let c of categories | slice:1">
        <div class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-full bg-white shadow">🔷</div>
        <div class="text-sm font-medium">{{ c.label }}</div>
      </div>
    </div>
  </section>

  <!-- Produits phares -->
  <section class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 pb-10">
    <h2 class="text-2xl font-bold">Produits phares</h2>

    <div class="mt-6 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
      <article *ngFor="let p of filteredProducts()" class="group rounded-2xl bg-white shadow hover:shadow-lg transition overflow-hidden">
        <div class="relative aspect-[4/3] w-full overflow-hidden bg-gray-50">
          <img [src]="p.imageUrl" [alt]="p.name" class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"/>
          <div *ngIf="p.discountPct" class="absolute left-3 top-3 rounded-full bg-orange-500 px-2 py-1 text-xs font-bold text-white">{{p.discountPct}}%</div>
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-gray-900">{{ p.name }}</h3>
          <p class="mt-1 text-gray-700 font-bold">{{ p.price | currency:'EUR':'symbol':'1.0-0':'fr' }}</p>
          <button class="mt-3 w-full rounded-lg bg-orange-500 px-3 py-2 text-sm font-semibold text-white hover:bg-orange-600">Ajouter au panier</button>
        </div>
      </article>
    </div>
  </section>

  <!-- Mode & footer simplifiés -->
  <section class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 pb-16">
    <h2 class="text-2xl font-bold">Mode</h2>
    <div class="mt-6 grid grid-cols-1 gap-6 sm:grid-cols-2">
      <div class="h-56 overflow-hidden rounded-2xl bg-gray-200">
        <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1520975916090-3105956dac38?q=80&w=1200&auto=format&fit=crop" alt="Man"/>
      </div>
      <div class="h-56 overflow-hidden rounded-2xl bg-gray-200">
        <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1200&auto=format&fit=crop" alt="Woman"/>
      </div>
    </div>
  </section>

  <footer class="bg-[#1f2937] text-white">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8 flex items-center justify-between">
      <div class="text-xl font-extrabold">KAOLO <span class="text-gray-300">Store</span></div>
      <nav class="flex items-center gap-6 text-sm text-gray-300">
        <a class="hover:text-white" routerLink="/">Accueil</a>
        <a class="hover:text-white" routerLink="/">Catégories</a>
        <a class="hover:text-white" routerLink="/">À propos</a>
      </nav>
      <div class="flex items-center gap-4 text-xl">
        <span>📘</span>
        <span>🐦</span>
        <span>📸</span>
      </div>
    </div>
  </footer>
</div>
