<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg">
<h1 class="text-center text-2xl font-bold mb-6">Connexion</h1>
<form>
    <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" name="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-orange-500 focus:border-orange-500 sm:text-sm">
    </div>
    <div class="mt-4">
        <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
        <input type="password" id="password" name="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-gray-500 focus:border-orange-500 sm:text-sm">
        </div>
        <button
        type="submit"
        class="w-full mt-5 bg-orange-500 text-white py-3 rounded-md hover:bg-gray-300 transition-colors"
        >
       Connexion
        </button>
        <p class="text-center text-sm mt-4">Pas encore de compte?<a routerLink="/login" class="text-orange-600 hover:underline">Créer un compte</a></p>
</form>
    </div>
</div>
